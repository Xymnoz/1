<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Xymnoz</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#050510,#101030);
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    width:350px;
    text-align:center;
    padding:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,170,255,.4);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    background:#222;
    border:3px solid cyan;
}

h1{
    margin:20px 0 5px;
    color:#6fdcff;
}

p{
    opacity:.8;
}

a{
    display:block;
    text-decoration:none;
    color:white;
    margin:12px 0;
    padding:12px;
    border-radius:12px;
    background:#1b4cff;
    transition:.3s;
}

a:hover{
    transform:scale(1.05);
    background:#2d6cff;
}
</style>

</head>

<body>

<div class="card">

<div class="avatar"></div>

<h1>Xymnoz</h1>

<p>Building the impossible.</p>

<a href="#">Discord</a>
<a href="#">YouTube</a>
<a href="#">GitHub</a>
<a href="#">Steam</a>

</div>

</body>
</html>
